id: youtube
name: YouTube Metadata
version: "0.5.0"
author: "Obscura Community"
description: "YouTube metadata via URL, filename `[id]` suffix, or title search (InnerTube + oEmbed, no API key)"
homepage: "https://www.youtube.com"
isNsfw: false
tags: [youtube, video, audio]
runtime: typescript
entry: "dist/youtube.js"

# No auth required. InnerTube `/youtubei/v1/player` (the same internal
# JSON API the youtube.com web player uses) returns title, description,
# duration, keywords, channel, publish date, category, and thumbnails
# with no account and no key of our own. oEmbed is the fallback if
# InnerTube is unreachable.

capabilities:
  videoByURL: true
  videoByName: true
  audioByURL: true
  supportsBatch: true
